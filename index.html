<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Bebas Neue', sans-serif;
      cursor: none;
    }

    /* FIX 1: canvas sits at z-index 0 (background), video at z-index 1 (above it) */
    .card-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .card video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      /* start grayscale, go full colour on active card */
      filter: grayscale(100%);
      transition: filter 0.6s ease;
    }

    /* FIX 2: only the active card's video goes full colour */
    .card.active video {
      filter: grayscale(0%);
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: width 0.2s, height 0.2s;
    }

    .cursor.big {
      width: 56px;
      height: 56px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9000;
    }

    /* BIG BG NAME */
    .jeff-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(120px, 22vw, 300px);
      letter-spacing: -4px;
      color: rgba(255, 255, 255, 0.04);
      pointer-events: none;
      z-index: 1;
      user-select: none;
      white-space: nowrap;
      transition: color 0.8s;
    }

    /* LOGO */
    .logo {
      position: fixed;
      top: 30px;
      left: 44px;
      font-size: 24px;
      letter-spacing: 7px;
      color: #fff;
      z-index: 200;
      mix-blend-mode: difference;
    }

    /* COUNTER */
    .counter {
      position: fixed;
      top: 34px;
      right: 44px;
      font-size: 12px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.22);
      z-index: 200;
    }

    .counter em {
      color: rgba(255, 255, 255, 0.7);
      font-style: normal;
    }

    /* CAROUSEL */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      z-index: 10;
      overflow: hidden;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 0 calc(50vw - 220px);
      transition: transform 0.72s cubic-bezier(0.77, 0, 0.175, 1);
      will-change: transform;
    }

    /* CARD */
    .card {
      flex-shrink: 0;
      width: 440px;
      height: 620px;
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      cursor: none;
      transform: scale(0.86) translateY(22px);
      opacity: 0.3;
      transition: transform 0.72s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.72s ease;
      background: #0d0d0d;
    }

    .card.active {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .card.adjacent {
      transform: scale(0.91) translateY(14px);
      opacity: 0.55;
    }

    /* Canvas placeholder z-index already set above */

    /* ARROWS */
    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, background 0.2s;
    }

    .arrow:hover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.07);
    }

    .arrow svg {
      stroke: #fff;
      width: 17px;
      fill: none;
      stroke-width: 1.5;
    }

    /* FIX 3: left arrow positioned clearly to the right of the stats panel */
    .arrow-left {
      left: 310px;
    }

    .arrow-right {
      right: 28px;
    }

    /* DOTS */
    .dots {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 200;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      cursor: none;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.6);
    }

    .hint {
      position: fixed;
      bottom: 62px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.13);
      z-index: 200;
      animation: fadeOut 1s 4s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    /* STATS PANEL — LEFT */
    .stats-panel {
      position: fixed;
      left: 44px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0;
      z-index: 300;
      pointer-events: none;
    }

    .stat-item {
      position: relative;
      padding: 28px 0;
      opacity: 0;
      transform: translateX(-32px);
      animation: statSlideIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .stat-item:nth-child(1) {
      animation-delay: 0.2s;
    }

    .stat-item:nth-child(2) {
      animation-delay: 0.45s;
    }

    .stat-item:nth-child(3) {
      animation-delay: 0.7s;
    }

    .stat-item+.stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
    }

    @keyframes statSlideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .stat-top {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      line-height: 1;
    }

    .stat-num {
      font-size: clamp(64px, 7vw, 100px);
      letter-spacing: -2px;
      color: #fff;
      line-height: 0.9;
      display: inline-block;
      min-width: 2ch;
    }

    .stat-num.counting {
      animation: digitFlicker 0.06s steps(1) infinite;
    }

    @keyframes digitFlicker {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.55;
      }

      100% {
        opacity: 1;
      }
    }

    .stat-suffix {
      font-size: clamp(28px, 3vw, 44px);
      color: rgba(255, 255, 255, 0.4);
      line-height: 1;
      padding-bottom: 6px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      display: block;
      margin-top: 6px;
    }

    .stat-accent {
      position: absolute;
      left: -16px;
      top: 28px;
      width: 1px;
      background: rgba(255, 255, 255, 0.2);
      height: 0;
      animation: accentGrow 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .stat-item:nth-child(1) .stat-accent {
      animation-delay: 0.5s;
    }

    .stat-item:nth-child(2) .stat-accent {
      animation-delay: 0.75s;
    }

    .stat-item:nth-child(3) .stat-accent {
      animation-delay: 1s;
    }

    @keyframes accentGrow {
      to {
        height: 60px;
      }
    }

    @media (max-width: 900px) {
      .stats-panel {
        left: 16px;
      }

      .stat-num {
        font-size: clamp(44px, 8vw, 72px);
      }

      .stat-suffix {
        font-size: clamp(20px, 4vw, 32px);
      }
    }

    @media (max-width: 600px) {
      .card {
        width: 80vw;
        height: 65vh;
      }

      .track {
        padding: 0 10vw;
        gap: 16px;
      }

      .arrow-left {
        left: 8px;
      }

      .arrow-right {
        right: 8px;
      }

      .logo {
        left: 20px;
      }

      .counter {
        right: 20px;
      }

      .stats-panel {
        top: auto;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        gap: 32px;
      }

      .stat-item {
        padding: 0;
      }

      .stat-item+.stat-item::before {
        display: none;
      }

      .stat-accent {
        display: none;
      }

      .stat-num {
        font-size: 36px;
      }

      .stat-suffix {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="jeff-bg">JEFF</div>
  <div class="logo">JEFF</div>
  <div class="counter"><em id="curN">1</em> / <span id="totN">6</span></div>

  <div class="stage">
    <div class="track" id="track">

      <!-- CARD 1 — FIX 4: spaces encoded as %20 in filenames -->
      <div class="card" data-i="0">
        <canvas class="card-canvas"></canvas>
        <video src="videos/cecafa.mp4" autoplay muted loop playsinline preload="auto"></video>
      </div>

      <!-- CARD 2 — FIX 4: "polo club.mp4" → "polo%20club.mp4" -->
      <div class="card" data-i="1">
        <canvas class="card-canvas"></canvas>
        <video src="videos/polo%20club.mp4" autoplay muted loop playsinline preload="auto"></video>
      </div>

      <!-- CARD 3 -->
      <div class="card" data-i="2">
        <canvas class="card-canvas"></canvas>
        <video src="videos/treatos.mp4" autoplay muted loop playsinline preload="auto"></video>
      </div>

      <!-- CARD 4 -->
      <div class="card" data-i="3">
        <canvas class="card-canvas"></canvas>
        <video src="videos/wrc2026.mp4" autoplay muted loop playsinline preload="auto"></video>
      </div>

      <!-- CARD 5 — placeholder until video added -->
      <div class="card" data-i="4">
        <canvas class="card-canvas"></canvas>
      </div>

      <!-- CARD 6 — placeholder until video added -->
      <div class="card" data-i="5">
        <canvas class="card-canvas"></canvas>
      </div>

    </div>
  </div>

  <!-- ARROWS -->
  <div class="arrow arrow-left" id="aL"><svg viewBox="0 0 24 24">
      <polyline points="15 18 9 12 15 6" />
    </svg></div>
  <div class="arrow arrow-right" id="aR"><svg viewBox="0 0 24 24">
      <polyline points="9 18 15 12 9 6" />
    </svg></div>

  <!-- DOTS -->
  <div class="dots" id="dots"></div>
  <div class="hint">DRAG · SCROLL · ARROW KEYS</div>

  <!-- STATS PANEL -->
  <div class="stats-panel">
    <div class="stat-item">
      <div class="stat-accent"></div>
      <div class="stat-top">
        <span class="stat-num" data-target="50">50</span>
        <span class="stat-suffix">+</span>
      </div>
      <span class="stat-label">Brands</span>
    </div>
    <div class="stat-item">
      <div class="stat-accent"></div>
      <div class="stat-top">
        <span class="stat-num" data-target="10">10</span>
        <span class="stat-suffix">M+</span>
      </div>
      <span class="stat-label">Views</span>
    </div>
    <div class="stat-item">
      <div class="stat-accent"></div>
      <div class="stat-top">
        <span class="stat-num" data-target="24">24</span>
        <span class="stat-suffix">K+</span>
      </div>
      <span class="stat-label">Followers</span>
    </div>
  </div>

  <script>
    // CURSOR
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('.arrow, .dot, .card').forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('big'));
      el.addEventListener('mouseleave', () => cur.classList.remove('big'));
    });

    // CANVAS PLACEHOLDERS
    const palettes = [
      ['#080808', '#141410', '#0a0a08'],
      ['#06080a', '#0e1214', '#060808'],
      ['#080a06', '#121408', '#080a06'],
      ['#0a0606', '#160e0e', '#0c0808'],
      ['#06060c', '#0e0e18', '#060608'],
      ['#0a0a06', '#161608', '#0c0c06'],
    ];
    const ltrs = ['J', 'E', 'F', 'F', 'K', 'E'];

    document.querySelectorAll('.card').forEach((card, i) => {
      const canvas = card.querySelector('.card-canvas');
      requestAnimationFrame(() => {
        const w = canvas.width = card.offsetWidth || 440;
        const h = canvas.height = card.offsetHeight || 620;
        const ctx = canvas.getContext('2d');
        const [c1, c2, c3] = palettes[i];
        const bg = ctx.createLinearGradient(0, 0, w, h);
        bg.addColorStop(0, c1); bg.addColorStop(.5, c2); bg.addColorStop(1, c3);
        ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);
        const gl = ctx.createRadialGradient(w * .4, h * .3, 0, w * .4, h * .3, w);
        gl.addColorStop(0, 'rgba(255,255,255,0.04)'); gl.addColorStop(1, 'transparent');
        ctx.fillStyle = gl; ctx.fillRect(0, 0, w, h);
        ctx.save();
        ctx.globalAlpha = 0.03;
        ctx.font = `bold ${Math.floor(h * .6)}px 'Bebas Neue',sans-serif`;
        ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ltrs[i], w / 2, h / 2);
        ctx.restore();
        for (let g = 0; g < 3500; g++) {
          ctx.fillStyle = `rgba(255,255,255,${Math.random() * .045})`;
          ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
        }
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, w, h * .05); ctx.fillRect(0, h * .95, w, h * .05);
      });
    });

    // FIX 5: only autoplay the active video; pause others to save bandwidth
    function syncVideos(activeIdx) {
      document.querySelectorAll('.card video').forEach((vid, i) => {
        if (i === activeIdx) {
          vid.play().catch(() => { }); // catch autoplay policy errors silently
        } else {
          vid.pause();
        }
      });
    }

    // CAROUSEL
    const track = document.getElementById('track');
    const cards = Array.from(document.querySelectorAll('.card'));
    const total = cards.length;
    let idx = 0;

    const dotsEl = document.getElementById('dots');
    document.getElementById('totN').textContent = total;
    cards.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => go(i));
      dotsEl.appendChild(d);
    });

    function cardW() { return (cards[0].offsetWidth || 440) + 28; }

    function go(n) {
      idx = ((n % total) + total) % total;
      track.style.transform = `translateX(${-idx * cardW()}px)`;
      cards.forEach((c, i) => {
        c.classList.remove('active', 'adjacent');
        if (i === idx) c.classList.add('active');
        else if (i === (idx - 1 + total) % total || i === (idx + 1) % total) c.classList.add('adjacent');
      });
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
      document.getElementById('curN').textContent = idx + 1;
      syncVideos(idx);
    }

    go(0);

    document.getElementById('aL').addEventListener('click', () => go(idx - 1));
    document.getElementById('aR').addEventListener('click', () => go(idx + 1));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') go(idx - 1);
      if (e.key === 'ArrowRight') go(idx + 1);
    });

    // Touch / drag
    let sx = 0, dragging = false;
    track.addEventListener('pointerdown', e => { sx = e.clientX; dragging = true; track.setPointerCapture(e.pointerId); });
    track.addEventListener('pointermove', e => {
      if (!dragging) return;
      track.style.transition = 'none';
      track.style.transform = `translateX(${-idx * cardW() + (e.clientX - sx)}px)`;
    });
    track.addEventListener('pointerup', e => {
      if (!dragging) return; dragging = false;
      track.style.transition = '';
      const dx = e.clientX - sx;
      if (dx < -50) go(idx + 1);
      else if (dx > 50) go(idx - 1);
      else go(idx);
    });

    // Wheel
    let wLock = false;
    window.addEventListener('wheel', e => {
      if (wLock) return; wLock = true;
      if (e.deltaX > 30 || e.deltaY > 30) go(idx + 1);
      else if (e.deltaX < -30 || e.deltaY < -30) go(idx - 1);
      setTimeout(() => wLock = false, 750);
    }, { passive: true });

    window.addEventListener('resize', () => go(idx));

    // COUNTDOWN ANIMATION
    function countdown(el) {
      const target = +el.dataset.target;
      const duration = 1600;
      const startVal = target * 3 + Math.floor(Math.random() * target * 2);
      const startTime = performance.now();
      el.classList.add('counting');
      function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        const current = Math.round(startVal - eased * (startVal - target));
        el.textContent = current;
        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          el.textContent = target;
          el.classList.remove('counting');
          el.style.transition = 'opacity 0.1s';
          el.style.opacity = '0.4';
          setTimeout(() => { el.style.opacity = '1'; }, 100);
        }
      }
      requestAnimationFrame(tick);
    }

    document.querySelectorAll('.stat-num').forEach((el, i) => {
      setTimeout(() => countdown(el), 700 + i * 280);
    });
  </script>
</body>

</html>
